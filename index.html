<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>6328 Battery Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold:      #EFAB28;
  --gold-dim:  rgba(239,171,40,0.18);
  --cream:     #F4F4EE;
  --blue-mid:  #446CE3;
  --blue-dark: #2F4E94;
  --blue-deep: #162F65;
  --navy:      #151D3B;
  --surface:   #1A2340;
  --surface2:  #1F2D52;
  --border:    #2F4E94;
  --bdim:      rgba(47,78,148,0.5);
  --muted:     #7A8DBF;
  --red:       #EF4444;
  --red-dim:   rgba(239,68,68,0.15);
  --green:     #22C55E;
  --tile:      200px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--navy);
  color: var(--cream);
  font-family: 'Barlow', 'Helvetica Neue', sans-serif;
  min-height: 100dvh;
  padding-bottom: 62px;
}
header {
  background: var(--surface);
  border-bottom: 2px solid var(--gold);
  padding: 11px 16px;
  display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 100;
}
.logo {
  width: 42px; height: 42px; flex-shrink: 0;
  background: var(--blue-deep);
  border: 1.5px solid var(--gold);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 800; color: var(--gold); letter-spacing: 0.5px;
}
.header-text h1 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 19px; font-weight: 800;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--cream); line-height: 1.1;
}
.header-text span {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 600; color: var(--gold);
  text-transform: uppercase; letter-spacing: 2px;
}
.stats-bar {
  display: flex; gap: 8px; padding: 9px 14px;
  background: var(--surface); border-bottom: 1px solid var(--bdim);
  overflow-x: auto; scrollbar-width: none;
}
.stats-bar::-webkit-scrollbar { display: none; }
.stat-chip {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface2); border: 1px solid var(--bdim);
  border-radius: 20px; padding: 5px 12px; white-space: nowrap;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 700; letter-spacing: 0.5px;
}
.dot { width: 8px; height: 8px; border-radius: 50%; }
.dot-idle { background: var(--muted); }
.dot-heat { background: var(--gold); }
.dot-rddy { background: var(--red); }
.filter-row {
  display: flex; gap: 7px; padding: 9px 14px 5px;
  overflow-x: auto; scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }
.filter-btn {
  padding: 6px 13px; border-radius: 20px;
  border: 1.5px solid var(--bdim);
  background: var(--surface); color: var(--muted);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 700; letter-spacing: 0.5px;
  text-transform: uppercase; cursor: pointer; white-space: nowrap;
  -webkit-tap-highlight-color: transparent; transition: all 0.12s;
}
.filter-btn.active { background: var(--gold); border-color: var(--gold); color: var(--navy); }
.grid-container {
  padding: 12px 14px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(var(--tile), 1fr));
  gap: 10px;
}
.bcard {
  background: var(--surface); border: 1.5px solid var(--bdim);
  border-radius: 14px; padding: 16px 14px 14px;
  cursor: pointer; position: relative; overflow: hidden;
  user-select: none; -webkit-tap-highlight-color: transparent;
  transition: border-color 0.15s, background 0.15s, transform 0.1s;
}
.bcard:active { transform: scale(0.96); }
.bcard.idle:hover { border-color: var(--blue-mid); }
.bcard.heating { border-color: var(--gold); background: var(--gold-dim); }
.bcard.overdue { border-color: var(--red); background: var(--red-dim); animation: pred 1.4s ease-in-out infinite; }
@keyframes pred {
  0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
  50%      { box-shadow: 0 0 14px 3px rgba(239,68,68,0.4); }
}
.bc-icon { position: absolute; top: 12px; right: 12px; font-size: 20px; opacity: 0.55; }
.bc-lbl  { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
.bc-num  { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 800; color: var(--cream); line-height: 1; margin-bottom: 10px; }
.bcard.heating .bc-num { color: var(--gold); }
.bcard.overdue .bc-num { color: var(--red); }
.bc-stat { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 4px; }
.bcard.heating .bc-stat { color: var(--gold); }
.bcard.overdue .bc-stat { color: var(--red); }
.bc-time { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--cream); }
.bcard.idle .bc-time { color: var(--muted); font-weight: 400; font-size: 13px; }
.bc-last { margin-top: 7px; display: inline-block; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; border-radius: 6px; padding: 3px 8px; }
.bc-last.cold  { color: var(--muted); background: var(--surface2); border: 1px solid var(--bdim); }
.bc-last.warm1 { color: #EFAB28; background: rgba(239,171,40,0.25); border: 1px solid rgba(239,171,40,0.6); }
.bc-last.warm2 { color: #e8a020; background: rgba(239,171,40,0.15); border: 1px solid rgba(239,171,40,0.4); }
.bc-last.warm3 { color: #c98a18; background: rgba(239,171,40,0.10); border: 1px solid rgba(239,171,40,0.25); }
.page { display: none; }
.page.active { display: block; }
.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 62px; background: var(--surface);
  border-top: 1.5px solid var(--bdim);
  display: flex; z-index: 150;
}
.tab-btn {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3px;
  cursor: pointer; border: none; background: none; color: var(--muted);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
  text-transform: uppercase; -webkit-tap-highlight-color: transparent;
  transition: color 0.12s;
}
.tab-btn.active { color: var(--gold); }
.tab-btn svg { width: 22px; height: 22px; }
.modal-backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(10,13,30,0.82);
  z-index: 200; align-items: flex-end; justify-content: center;
}
.modal-backdrop.open { display: flex; }
.modal {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 20px 20px 0 0; padding: 22px 22px 36px;
  width: 100%; max-width: 500px;
  max-height: 90dvh; overflow-y: auto;
  animation: slideup 0.22s ease-out;
}
@keyframes slideup { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.mhandle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
.mtitle { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--gold); margin-bottom: 2px; }
.msub   { font-size: 13px; color: var(--muted); margin-bottom: 18px; }
.irow   { display: flex; align-items: center; gap: 10px; background: var(--surface2); border: 1px solid var(--bdim); border-radius: 10px; padding: 13px; margin-bottom: 8px; }
.irow .ic { font-size: 18px; }
.irow .il { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.irow .iv { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; margin-top: 1px; }
.btn-row { display: flex; flex-direction: column; gap: 9px; margin-top: 16px; }
.btn { padding: 15px; border-radius: 12px; font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; border: none; cursor: pointer; width: 100%; transition: opacity 0.12s, transform 0.1s; -webkit-tap-highlight-color: transparent; }
.btn:active { transform: scale(0.97); }
.btn-gold  { background: var(--gold); color: var(--navy); }
.btn-ghost { background: var(--surface2); color: var(--cream); border: 1.5px solid var(--bdim); }
.btn-red   { background: var(--red-dim); color: var(--red); border: 1.5px solid var(--red); }
.tsec { margin-bottom: 16px; }
.tlbl { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 8px; }
.trow { display: flex; gap: 7px; flex-wrap: wrap; }
.tbtn { flex: 1; min-width: 58px; padding: 12px 6px; border-radius: 10px; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; border: 1.5px solid var(--bdim); background: var(--surface2); color: var(--cream); cursor: pointer; text-align: center; -webkit-tap-highlight-color: transparent; transition: all 0.12s; }
.tbtn.sel { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }
.tbtn:active { opacity: 0.7; }
.cwrap { margin-top: 9px; display: none; }
.cwrap.show { display: block; }
.cwrap input { width: 100%; padding: 13px; border-radius: 10px; background: var(--surface2); border: 1.5px solid var(--bdim); color: var(--cream); font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; text-align: center; outline: none; }
.cwrap input:focus { border-color: var(--gold); }
.htoolbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px 4px; }
.hcount { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
.btn-sm { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; background: none; border: 1.5px solid var(--bdim); color: var(--muted); border-radius: 8px; padding: 5px 12px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.btn-sm:active { opacity: 0.6; }
.hdatelbl { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); padding: 14px 16px 6px; }
.hentry { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1.5px solid var(--bdim); border-radius: 12px; margin: 0 14px 8px; padding: 13px 14px; }
.hentry.late { border-color: rgba(239,68,68,0.4); }
.hbadge { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 800; color: var(--gold); background: var(--gold-dim); border: 1.5px solid var(--gold); border-radius: 8px; padding: 6px 10px; white-space: nowrap; flex-shrink: 0; }
.hmain { flex: 1; min-width: 0; }
.htimes { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; color: var(--cream); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hmeta { display: flex; align-items: center; gap: 8px; margin-top: 3px; flex-wrap: wrap; }
.hdur  { font-size: 12px; color: var(--muted); font-weight: 600; }
.htag  { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 7px; border-radius: 4px; }
.htag.ok   { background: rgba(34,197,94,0.15); color: var(--green); }
.htag.late { background: var(--red-dim); color: var(--red); }
.empty { text-align: center; padding: 60px 24px; color: var(--muted); }
.empty .big { font-size: 44px; margin-bottom: 12px; }
.empty p { font-size: 15px; line-height: 1.6; }
.msec { padding: 14px 14px 6px; }
.msec-title { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 10px; }
.size-row { display: flex; gap: 8px; margin-bottom: 20px; }
.size-opt {
  flex: 1; padding: 12px 4px; border-radius: 10px;
  border: 1.5px solid var(--bdim); background: var(--surface);
  color: var(--muted); cursor: pointer; text-align: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
  -webkit-tap-highlight-color: transparent; transition: all 0.12s;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.size-opt .sicon { font-size: 20px; }
.size-opt.active { border-color: var(--gold); background: var(--gold-dim); color: var(--gold); }
.size-opt:active { opacity: 0.7; }
.add-row { display: flex; gap: 8px; margin-bottom: 16px; }
.add-row input { flex: 1; padding: 13px 14px; border-radius: 10px; background: var(--surface); border: 1.5px solid var(--bdim); color: var(--cream); font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; outline: none; }
.add-row input:focus { border-color: var(--gold); }
.add-row input::placeholder { color: var(--muted); font-weight: 400; }
.btn-add { padding: 13px 16px; border-radius: 10px; background: var(--gold); color: var(--navy); font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 800; border: none; cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
.btn-add:active { opacity: 0.8; }
.blist-item { display: flex; align-items: center; background: var(--surface); border: 1.5px solid var(--bdim); border-radius: 10px; padding: 12px 14px; margin-bottom: 7px; gap: 12px; }
.blist-num { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 800; color: var(--gold); flex: 1; }
.blist-st  { font-size: 12px; color: var(--muted); margin-right: 8px; }
.btn-rm { padding: 6px 12px; border-radius: 7px; background: var(--red-dim); color: var(--red); border: 1px solid var(--red); font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.btn-rm:disabled { opacity: 0.3; cursor: default; }
.btn-rm:not(:disabled):active { opacity: 0.7; }
.toast-container { position: fixed; top: 76px; left: 50%; transform: translateX(-50%); z-index: 300; display: flex; flex-direction: column; gap: 8px; pointer-events: none; width: calc(100% - 28px); max-width: 420px; }
.toast { background: var(--surface); border: 1.5px solid var(--red); border-radius: 12px; padding: 13px 16px; animation: tin 0.22s ease-out; box-shadow: 0 4px 24px rgba(0,0,0,0.6); }
.toast span { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; color: var(--cream); }
@keyframes tin { from { transform: translateY(-14px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* LOG PAGE */
.log-battery-list { padding: 10px 14px; display: flex; flex-direction: column; gap: 8px; }
.log-bat-row {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface); border: 1.5px solid var(--bdim);
  border-radius: 12px; padding: 14px;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: border-color 0.12s;
}
.log-bat-row:active { opacity: 0.7; }
.log-bat-row:hover  { border-color: var(--blue-mid); }
.log-bat-num { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 800; color: var(--gold); min-width: 60px; }
.log-bat-stats { flex: 1; display: flex; gap: 16px; }
.log-stat { display: flex; flex-direction: column; }
.log-stat-lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
.log-stat-val { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; color: var(--cream); }
.log-stat-val.none { color: var(--muted); font-size: 13px; font-weight: 400; }
.log-bat-count { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; color: var(--muted); text-align: right; }
.log-chevron { color: var(--muted); font-size: 18px; }

/* LOG DETAIL (sub-page within log tab) */
.log-detail { display: none; }
.log-detail.active { display: block; }
.log-list-page { display: block; }
.log-list-page.hidden { display: none; }

.log-back {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 14px 4px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px; font-weight: 700; color: var(--gold);
  text-transform: uppercase; letter-spacing: 0.5px;
}
.log-back:active { opacity: 0.7; }

.log-averages {
  display: flex; gap: 10px;
  padding: 10px 14px 14px;
}
.avg-card {
  flex: 1; background: var(--surface); border: 1.5px solid var(--gold);
  border-radius: 12px; padding: 14px 12px;
  text-align: center;
}
.avg-card-lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); margin-bottom: 4px; }
.avg-card-val { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 800; color: var(--cream); line-height: 1; }
.avg-card-unit { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; color: var(--muted); margin-top: 2px; }
.avg-card-sub  { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; color: var(--muted); margin-top: 2px; }

.log-entry-list { padding: 0 14px 14px; display: flex; flex-direction: column; gap: 8px; }
.log-entry {
  background: var(--surface); border: 1.5px solid var(--bdim);
  border-radius: 10px; padding: 12px 14px;
  display: flex; align-items: center; gap: 12px;
}
.log-entry-ts { font-size: 12px; color: var(--muted); min-width: 90px; }
.log-entry-vals { flex: 1; display: flex; gap: 16px; }
.log-entry-val { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; color: var(--cream); }
.log-entry-val span { font-size: 11px; color: var(--muted); font-weight: 400; font-family: 'Barlow', sans-serif; }
.log-entry-del { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px; -webkit-tap-highlight-color: transparent; }
.log-entry-del:active { color: var(--red); }

.log-add-btn {
  display: block; margin: 0 14px 14px;
  padding: 15px; border-radius: 12px;
  background: var(--gold); color: var(--navy);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 17px; font-weight: 800; letter-spacing: 0.5px;
  text-transform: uppercase; border: none;
  cursor: pointer; width: calc(100% - 28px);
  -webkit-tap-highlight-color: transparent;
}
.log-add-btn:active { opacity: 0.85; }

/* LOG ENTRY MODAL */
.log-modal-backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(10,13,30,0.82);
  z-index: 250; align-items: flex-end; justify-content: center;
}
.log-modal-backdrop.open { display: flex; }
.log-modal {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 20px 20px 0 0; padding: 22px 22px 36px;
  width: 100%; max-width: 500px;
  animation: slideup 0.22s ease-out;
}
.lm-title { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
.lm-field { margin-bottom: 14px; }
.lm-lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 6px; }
.lm-input-row { display: flex; gap: 8px; align-items: center; }
.lm-input {
  flex: 1; padding: 14px; border-radius: 10px;
  background: var(--surface2); border: 1.5px solid var(--bdim);
  color: var(--cream); font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px; font-weight: 700; outline: none;
  -webkit-appearance: none;
}
.lm-input:focus { border-color: var(--gold); }
.lm-unit { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; color: var(--muted); min-width: 32px; }
.lm-toggle { display: flex; align-items: center; gap: 14px; background: var(--surface2); border: 1.5px solid var(--bdim); border-radius: 12px; padding: 14px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: border-color 0.15s, background 0.15s; margin-bottom: 14px; }
.lm-toggle.on { border-color: var(--gold); background: var(--gold-dim); }
.lm-toggle-icon { font-size: 24px; }
.lm-toggle-text { flex: 1; }
.lm-toggle-text .tlbl { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 0; }
.lm-toggle.on .lm-toggle-text .tlbl { color: var(--gold); }
.lm-toggle-text small { font-size: 12px; color: var(--muted); }
.lm-check { width: 26px; height: 26px; border-radius: 6px; border: 2px solid var(--bdim); background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; transition: all 0.15s; }
.lm-toggle.on .lm-check { background: var(--gold); border-color: var(--gold); }
</style>
</head>
<body>

<header>
  <div class="logo">6328</div>
  <div class="header-text">
    <h1>Battery Tracker</h1>
    <span>Mechanical Advantage</span>
  </div>
</header>

<div id="page-tracker" class="page active">
  <div class="stats-bar" id="stats-bar"></div>
  <div class="filter-row" id="filter-row">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="heating">Heating</button>
    <button class="filter-btn" data-filter="ready">Remove Now</button>
    <button class="filter-btn" data-filter="idle">Idle</button>
  </div>
  <div class="grid-container" id="grid"></div>
</div>

<div id="page-history" class="page">
  <div class="filter-row" id="hist-tab-bar"></div>
  <div id="hist-content"></div>
</div>

<div id="page-manage" class="page">
  <div class="msec">
    <div class="msec-title">Tile Size</div>
    <div class="size-row" id="size-row">
      <button class="size-opt" data-size="120" onclick="setTileSize(this)"><span class="sicon">⬛</span>Small</button>
      <button class="size-opt" data-size="160" onclick="setTileSize(this)"><span class="sicon">🟧</span>Medium</button>
      <button class="size-opt active" data-size="200" onclick="setTileSize(this)"><span class="sicon">🟠</span>Large</button>
      <button class="size-opt" data-size="280" onclick="setTileSize(this)"><span class="sicon">🔶</span>XL</button>
    </div>
    <div class="msec-title">Add Battery</div>
    <div class="add-row">
      <input type="text" id="add-input" placeholder="e.g. 031" maxlength="3" inputmode="numeric">
      <button class="btn-add" onclick="addBattery()">+ Add</button>
    </div>
    <div class="msec-title">All Batteries</div>
    <div id="blist"></div>
    <div class="msec-title" style="margin-top:16px">Export / Import</div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button class="btn btn-ghost" style="flex:1" onclick="exportCSV()">&#8595; Export CSV</button>
      <button class="btn btn-ghost" style="flex:1" onclick="exportJSON()">&#8595; Export JSON</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:20px">
      <button class="btn btn-ghost" style="flex:1;color:var(--gold);border-color:var(--gold)" onclick="document.getElementById('import-file').click()">&#8593; Import JSON</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importJSON(event)">
    </div>
  </div>
</div>

<div id="page-log" class="page">
  <!-- Battery list view -->
  <div id="log-list-page">
    <div class="filter-row" id="log-event-bar"></div>
    <div class="log-battery-list" id="log-battery-list"></div>
  </div>
  <!-- Detail view for one battery -->
  <div id="log-detail-page" style="display:none">
    <div class="log-back" onclick="closeLogDetail()">&#8592; All Batteries</div>
    <div style="padding:0 14px 6px">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;color:var(--gold)" id="log-detail-title"></div>
      <div style="font-size:12px;color:var(--muted)" id="log-detail-sub"></div>
    </div>
    <div class="log-averages" id="log-averages"></div>
    <div style="display:flex;gap:8px;margin:0 14px 0">
      <button class="log-add-btn" style="flex:2" onclick="openLogEntry()">+ Add Entry</button>
      <button class="log-add-btn" style="flex:1;background:var(--surface2);color:var(--muted);border:1.5px solid var(--bdim)" onclick="exportCSV()">&#8595; CSV</button>
    </div>
    <div class="log-entry-list" id="log-entry-list"></div>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" id="tab-tracker" onclick="switchTab('tracker')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-4 0v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
    Tracker
  </button>
  <button class="tab-btn" id="tab-history" onclick="switchTab('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    History
  </button>
  <button class="tab-btn" id="tab-log" onclick="switchTab('log')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Log
  </button>
  <button class="tab-btn" id="tab-manage" onclick="switchTab('manage')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    Manage
  </button>
</div>

<!-- LOG ENTRY MODAL -->
<div class="log-modal-backdrop" id="log-modal-backdrop">
  <div class="log-modal">
    <div class="mhandle"></div>
    <div class="lm-title" id="lm-title">Add Entry</div>
    <div class="lm-field">
      <div class="lm-lbl">Resistance</div>
      <div class="lm-input-row">
        <input class="lm-input" type="number" id="lm-resist" placeholder="0.00" step="0.01" inputmode="decimal">
        <span class="lm-unit">m&#8486;</span>
      </div>
    </div>
    <div class="lm-field">
      <div class="lm-lbl">Power</div>
      <div class="lm-input-row">
        <input class="lm-input" type="number" id="lm-power" placeholder="0.00" step="0.01" inputmode="decimal">
        <span class="lm-unit">W</span>
      </div>
    </div>
    <div class="lm-field">
      <div class="lm-lbl">Match / Note <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></div>
      <input class="lm-input" type="text" id="lm-note" placeholder="e.g. Quals 3" style="width:100%">
    </div>
    <div class="lm-toggle" id="lm-heated-toggle" onclick="toggleHeated()">
      <span class="lm-toggle-icon">🔥</span>
      <div class="lm-toggle-text">
        <div class="tlbl">Battery was heated</div>
        <small>Was this battery warmed up before this match?</small>
      </div>
      <div class="lm-check" id="lm-check">&#10003;</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-gold" id="lm-save-btn" onclick="saveLogEntry()">Save Entry</button>
      <button class="btn btn-ghost" onclick="closeLogEntry()">Cancel</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle" id="mtitle"></div>
    <div class="msub" id="msub"></div>
    <div id="minfo"></div>
    <div id="mtime" class="tsec" style="display:none">
      <div class="tlbl">How long ago did heating start?</div>
      <div class="trow" id="trow">
        <button class="tbtn sel" data-m="0">Just now</button>
        <button class="tbtn" data-m="15">15 min</button>
        <button class="tbtn" data-m="30">30 min</button>
        <button class="tbtn" data-m="45">45 min</button>
        <button class="tbtn" data-m="custom">Other</button>
      </div>
      <div class="cwrap" id="cwrap"><input type="number" id="cmin" min="0" max="59" placeholder="Minutes ago" inputmode="numeric"></div>
    </div>
    <div class="btn-row" id="mactions"></div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
var HEAT_MS = 3600000;
var bats = {};
var heatLog = [];
var batLogs = {};      // { bid: [{ts,resist,power,note,event}] }
var usageCounts = {};  // { bid: { eventCode: count } }
var events = [];       // ['overall','mabil',...]
var curEvent = 'overall';
var bIds = [];
var curFilter = 'all';
var histFilter = 'all'; // 'all' or a battery id
var selId = null;
var logBid = null;
var logEditIdx = null;
var minsAgo = 0;
var alerted = {};

function mkid(n) { return '2026-' + String(n).padStart(3,'0'); }

function init() {
  var si = localStorage.getItem('ma-ids');
  if (si) { try { bIds = JSON.parse(si); } catch(e) {} }
  if (!bIds.length) { for (var i=1;i<=30;i++) bIds.push(mkid(i)); }
  var sb = localStorage.getItem('ma-bats');
  if (sb) { try { bats = JSON.parse(sb); } catch(e) {} }
  bIds.forEach(function(bid){ if (!bats[bid]) bats[bid] = {status:'idle',startMs:null}; });
  var sh = localStorage.getItem('ma-log');
  if (sh) { try { heatLog = JSON.parse(sh); } catch(e) {} }
  var sl = localStorage.getItem('ma-batlogs');
  if (sl) { try { batLogs = JSON.parse(sl); } catch(e) {} }
  var su = localStorage.getItem('ma-usage');
  if (su) { try { usageCounts = JSON.parse(su); } catch(e) {} }
  var se = localStorage.getItem('ma-events');
  if (se) { try { events = JSON.parse(se); } catch(e) {} }
  if (!events.length) events = ['overall'];
  var sc = localStorage.getItem('ma-curevent');
  if (sc) curEvent = sc;
}

function persist() {
  localStorage.setItem('ma-ids', JSON.stringify(bIds));
  localStorage.setItem('ma-bats', JSON.stringify(bats));
}
function persistLog()   { localStorage.setItem('ma-log',     JSON.stringify(heatLog)); }
function persistBatLogs(){ localStorage.setItem('ma-batlogs', JSON.stringify(batLogs)); }
function persistUsage()  { localStorage.setItem('ma-usage',   JSON.stringify(usageCounts)); }
function persistEvents() { localStorage.setItem('ma-events',  JSON.stringify(events)); localStorage.setItem('ma-curevent', curEvent); }

function status(bid) {
  var b = bats[bid];
  if (!b) return 'idle';
  if (b.status !== 'heating') return b.status;
  return (Date.now()-b.startMs >= HEAT_MS) ? 'overdue' : 'heating';
}

function lastHeat(bid) {
  for (var i=heatLog.length-1;i>=0;i--) { if (heatLog[i].bid===bid) return heatLog[i]; }
  return null;
}

function pad(n) { return String(n).padStart(2,'0'); }
function ftc(ms) { var t=Math.max(0,ms); return pad(Math.floor(t/60000))+':'+pad(Math.floor((t%60000)/1000)); }
function fel(ms) { var t=Math.abs(ms),m=Math.floor(t/60000),s=Math.floor((t%60000)/1000); return m>=60?Math.floor(m/60)+'h '+(m%60)+'m':m+'m '+s+'s'; }
function ft(ms)  { return new Date(ms).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function fd(ms)  { return new Date(ms).toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'}); }

function sortedIds() {
  return bIds.slice().sort(function(a,b) {
    var sa=status(a),sb=status(b),ha=sa==='heating'||sa==='overdue',hb=sb==='heating'||sb==='overdue';
    if (ha!==hb) return ha?-1:1;
    if (ha&&hb) {
      if (sa==='overdue'&&sb!=='overdue') return -1;
      if (sb==='overdue'&&sa!=='overdue') return 1;
      return bats[a].startMs-bats[b].startMs;
    }
    var la=lastHeat(a),lb=lastHeat(b),ta=la?la.endMs:0,tb=lb?lb.endMs:0;
    if (ta!==tb) return ta-tb;
    return parseInt(a.split('-')[1])-parseInt(b.split('-')[1]);
  });
}

function buildStats() {
  var idle=0,heat=0,over=0;
  bIds.forEach(function(b){ var s=status(b); if(s==='idle')idle++; else if(s==='heating')heat++; else if(s==='overdue')over++; });
  document.getElementById('stats-bar').innerHTML=
    '<div class="stat-chip"><div class="dot dot-idle"></div>'+idle+' Idle</div>'+
    '<div class="stat-chip"><div class="dot dot-heat"></div>'+heat+' Heating</div>'+
    '<div class="stat-chip"><div class="dot dot-rddy"></div>'+over+' Remove Now</div>';
}

function buildGrid() {
  var grid=document.getElementById('grid'), ids=sortedIds();
  ids.forEach(function(bid) {
    var b=bats[bid], s=status(bid);
    var show=curFilter==='all'||(curFilter==='heating'&&(s==='heating'||s==='overdue'))||(curFilter==='ready'&&s==='overdue')||(curFilter==='idle'&&s==='idle');
    var card=grid.querySelector('[data-id="'+bid+'"]');
    if(!card){
      card=document.createElement('div');
      card.dataset.id=bid;
      card.addEventListener('click',(function(id){return function(){openModal(id);};})(bid));
    }
    grid.appendChild(card);
    card.style.display=show?'':'none';
    card.className='bcard '+(s==='overdue'?'overdue':s);
    var icon=s==='idle'?'🔋':s==='heating'?'🔥':'⚠️';
    var stxt=s==='idle'?'Idle':s==='heating'?'Heating':'REMOVE NOW';
    var ttxt=s==='idle'?'Tap to heat':s==='heating'?ftc(HEAT_MS-(Date.now()-b.startMs))+' left':fel((Date.now()-b.startMs)-HEAT_MS)+' overdue';
    var lh=lastHeat(bid), lastChip='';
    if (lh) {
      var age = Date.now() - lh.endMs;
      var warmClass = age < 30*60000 ? 'warm1' : age < 60*60000 ? 'warm2' : age < 120*60000 ? 'warm3' : 'cold';
      var lastLbl = age < 120*60000 ? '🔥 ' + fel(age) + ' ago' : 'Last: '+ft(lh.endMs);
      lastChip = '<div class="bc-last '+warmClass+'">'+lastLbl+'</div>';
    }
    card.innerHTML='<div class="bc-icon">'+icon+'</div><div class="bc-lbl">Battery</div><div class="bc-num">'+bid.split('-')[1]+'</div><div class="bc-stat">'+stxt+'</div><div class="bc-time">'+ttxt+'</div>'+lastChip;
  });
  var all=grid.querySelectorAll('.bcard');
  all.forEach(function(c){ if(bIds.indexOf(c.dataset.id)===-1) c.remove(); });
}

function buildHistTabBar() {
  // Only show tabs for batteries that actually have heat events
  var bidsWithHistory = bIds.filter(function(bid){
    return heatLog.some(function(e){ return e.bid === bid; });
  });
  var bar = document.getElementById('hist-tab-bar');
  if (!bar) return;
  var h = '<button class="filter-btn'+(histFilter==='all'?' active':'')+'" onclick="setHistFilter(\'all\')">All</button>';
  bidsWithHistory.forEach(function(bid) {
    h += '<button class="filter-btn'+(histFilter===bid?' active':'')+'" onclick="setHistFilter(\''+bid+'\')">'+bid.split('-')[1]+'</button>';
  });
  bar.innerHTML = h;
}

function setHistFilter(val) {
  histFilter = val;
  buildHistTabBar();
  buildHistContent();
}

function buildHistory() {
  buildHistTabBar();
  buildHistContent();
}

function buildHistContent() {
  var el = document.getElementById('hist-content');
  var filtered = histFilter === 'all'
    ? heatLog
    : heatLog.filter(function(e){ return e.bid === histFilter; });

  if (!filtered.length) {
    el.innerHTML = '<div class="empty"><div class="big">🕐</div><p>'+(heatLog.length ? 'No sessions for this battery yet.' : 'No sessions yet.<br>Remove a battery from heat to log it here.')+'</p></div>';
    return;
  }

  var groups = {};
  filtered.slice().reverse().forEach(function(e) {
    var d = fd(e.endMs);
    if (!groups[d]) groups[d] = [];
    groups[d].push(e);
  });

  var clearTarget = histFilter === 'all' ? 'all' : histFilter;
  var clearLabel = histFilter === 'all' ? 'Clear All' : 'Clear';
  var h = '<div class="htoolbar"><span class="hcount">'+filtered.length+' session'+(filtered.length!==1?'s':'')+'</span><button class="btn-sm" onclick="clearLog(\''+clearTarget+'\')">'+clearLabel+'</button></div>';

  Object.keys(groups).forEach(function(date) {
    h += '<div class="hdatelbl">'+date+'</div>';
    groups[date].forEach(function(e) {
      // When viewing all batteries show the badge; when on a single battery, show a shorter label
      var badge = histFilter === 'all'
        ? '<div class="hbadge">'+e.bid.split('-')[1]+'</div>'
        : '<div class="hbadge" style="font-size:13px;padding:4px 8px">'+ft(e.startMs)+'</div>';
      h += '<div class="hentry'+(e.overdue?' late':'')+'">'+
        badge+
        '<div class="hmain">'+
          '<div class="htimes">'+ft(e.startMs)+' &rarr; '+ft(e.endMs)+'</div>'+
          '<div class="hmeta">'+
            '<span class="hdur">'+fel(e.endMs-e.startMs)+'</span>'+
            (e.overdue?'<span class="htag late">Overdue</span>':'<span class="htag ok">On Time</span>')+
          '</div>'+
        '</div>'+
      '</div>';
    });
  });
  el.innerHTML = h;
}

function clearLog(target) {
  if (!confirm('Clear heating history'+(target==='all'?'':' for battery '+target)+'?')) return;
  if (target === 'all') {
    heatLog = [];
  } else {
    heatLog = heatLog.filter(function(e){ return e.bid !== target; });
  }
  persistLog();
  buildHistory();
}

function buildManage() {
  var list=document.getElementById('blist'), h='';
  bIds.forEach(function(bid){
    var s=status(bid), sl=s==='idle'?'Idle':s==='heating'?'Heating':'Remove Now';
    h+='<div class="blist-item"><div class="blist-num">'+bid+'</div><div class="blist-st">'+sl+'</div><button class="btn-rm" onclick="removeBat(\''+bid+'\')" '+(s==='idle'?'':'disabled')+'>Remove</button></div>';
  });
  list.innerHTML=h||'<div style="color:var(--muted);text-align:center;padding:20px">No batteries</div>';
}

function addBattery() {
  var inp=document.getElementById('add-input'),val=inp.value.trim();
  if(!val||isNaN(val)){inp.focus();return;}
  var bid='2026-'+String(parseInt(val)).padStart(3,'0');
  if(bIds.indexOf(bid)!==-1){alert(bid+' already exists');return;}
  bIds.push(bid); bIds.sort(function(a,b){return parseInt(a.split('-')[1])-parseInt(b.split('-')[1]);});
  bats[bid]={status:'idle',startMs:null}; persist(); inp.value='';
  buildManage(); buildGrid(); buildStats();
}

function removeBat(bid) {
  if(status(bid)!=='idle'){alert('Cannot remove a battery that is heating.');return;}
  if(!confirm('Remove '+bid+'?')) return;
  bIds=bIds.filter(function(id){return id!==bid;}); delete bats[bid]; persist();
  buildManage(); buildGrid(); buildStats();
}

function checkAlerts() {
  bIds.forEach(function(bid){
    if(bats[bid]&&bats[bid].status==='heating'){
      var s=status(bid);
      if(s==='overdue'&&!alerted[bid]){alerted[bid]=true;showToast('Battery '+bid+' is ready! Remove from heat.');}
      if(s==='heating') alerted[bid]=false;
    }
  });
}

function showToast(msg) {
  var tc=document.getElementById('toast-container'),t=document.createElement('div');
  t.className='toast'; t.innerHTML='<span>'+msg+'</span>'; tc.appendChild(t);
  setTimeout(function(){t.style.transition='opacity 0.4s';t.style.opacity='0';setTimeout(function(){t.remove();},400);},5000);
}

function tick() { buildStats(); buildGrid(); checkAlerts(); }

function irow(icon,lbl,val) { return '<div class="irow"><span class="ic">'+icon+'</span><div><div class="il">'+lbl+'</div><div class="iv">'+val+'</div></div></div>'; }

function openModal(bid) {
  selId=bid; minsAgo=0;
  var b=bats[bid], s=status(bid);
  document.getElementById('mtitle').textContent='Battery '+bid;
  var info=document.getElementById('minfo'),mtime=document.getElementById('mtime'),mact=document.getElementById('mactions');
  info.innerHTML=''; mtime.style.display='none'; mact.innerHTML='';
  if(s==='idle'){
    document.getElementById('msub').textContent='Not currently heating.';
    mtime.style.display='block'; resetTime();
    mact.innerHTML='<button class="btn btn-gold" onclick="startHeat()">🔥 Start Heating</button><button class="btn btn-ghost" onclick="closeModal()">Cancel</button>';
  } else if(s==='heating'){
    document.getElementById('msub').textContent='Currently heating.';
    info.innerHTML=irow('🕐','Started at',ft(b.startMs))+irow('⏱️','Elapsed','<span id="mel">'+fel(Date.now()-b.startMs)+'</span>')+irow('✅','Remove at',ft(b.startMs+HEAT_MS))+irow('⏳','Remaining','<span id="mrem">'+ftc(HEAT_MS-(Date.now()-b.startMs))+'</span>');
    mact.innerHTML='<button class="btn btn-red" onclick="markDone()">✅ Mark as Removed</button><button class="btn btn-ghost" onclick="closeModal()">Close</button>';
  } else {
    document.getElementById('msub').textContent='Should have been removed already!';
    info.innerHTML=irow('🕐','Started at',ft(b.startMs))+irow('⚠️','Should remove at',ft(b.startMs+HEAT_MS))+irow('⏰','Overdue by','<span id="mov" style="color:var(--red)">'+fel((Date.now()-b.startMs)-HEAT_MS)+'</span>');
    mact.innerHTML='<button class="btn btn-red" onclick="markDone()">✅ Mark as Removed</button><button class="btn btn-ghost" onclick="closeModal()">Close</button>';
  }
  document.getElementById('modal-backdrop').classList.add('open');
}

function closeModal() { document.getElementById('modal-backdrop').classList.remove('open'); selId=null; }

function resetTime() {
  minsAgo=0;
  document.querySelectorAll('.tbtn').forEach(function(b){b.classList.toggle('sel',b.dataset.m==='0');});
  document.getElementById('cwrap').classList.remove('show');
  document.getElementById('cmin').value='';
}

function startHeat() {
  if(!selId) return;
  var ago=minsAgo;
  if(document.getElementById('cwrap').classList.contains('show')){var v=parseInt(document.getElementById('cmin').value,10);ago=isNaN(v)?0:Math.min(v,59);}
  bats[selId]={status:'heating',startMs:Date.now()-ago*60000};
  persist(); closeModal(); tick();
}

function markDone() {
  if(!selId) return;
  var b=bats[selId],end=Date.now(),over=status(selId)==='overdue';
  heatLog.push({bid:selId,startMs:b.startMs,endMs:end,overdue:over});
  persistLog();
  bats[selId]={status:'idle',startMs:null}; alerted[selId]=false;
  persist(); closeModal(); tick();
}

document.getElementById('trow').addEventListener('click',function(e){
  var btn=e.target.closest('.tbtn'); if(!btn) return;
  document.querySelectorAll('.tbtn').forEach(function(b){b.classList.remove('sel');}); btn.classList.add('sel');
  var v=btn.dataset.m, cw=document.getElementById('cwrap');
  if(v==='custom'){cw.classList.add('show');minsAgo=0;}else{cw.classList.remove('show');minsAgo=parseInt(v,10);}
});

document.getElementById('modal-backdrop').addEventListener('click',function(e){if(e.target===document.getElementById('modal-backdrop'))closeModal();});

document.getElementById('filter-row').addEventListener('click',function(e){
  var btn=e.target.closest('.filter-btn'); if(!btn) return;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');}); btn.classList.add('active');
  curFilter=btn.dataset.filter; buildGrid();
});

document.getElementById('add-input').addEventListener('keydown',function(e){if(e.key==='Enter')addBattery();});

setInterval(function(){
  if(!selId) return; var b=bats[selId]; if(!b||b.status!=='heating') return;
  var el=Date.now()-b.startMs,rem=HEAT_MS-el;
  var re=document.getElementById('mrem'),me=document.getElementById('mel'),mo=document.getElementById('mov');
  if(re)re.textContent=ftc(rem); if(me)me.textContent=fel(el); if(mo)mo.textContent=fel(Math.abs(rem));
},1000);

// ── LOG PAGE ──

function logsFor(bid, ev) {
  var entries = batLogs[bid] || [];
  return ev === 'overall' ? entries : entries.filter(function(e){ return e.event === ev; });
}

function usageFor(bid, ev) {
  var u = usageCounts[bid] || {};
  if (ev === 'overall') {
    return Object.values ? Object.values(u).reduce(function(a,b){return a+b;},0)
                        : Object.keys(u).reduce(function(s,k){return s+u[k];},0);
  }
  return u[ev] || 0;
}

function avg(arr, key) {
  var vals = arr.filter(function(e){ return e[key]!=null && e[key]!==''; });
  if (!vals.length) return null;
  return (vals.reduce(function(s,e){ return s+parseFloat(e[key]); },0) / vals.length).toFixed(2);
}

function buildEventBar() {
  var bar = document.getElementById('log-event-bar');
  if (!bar) return;
  var h = '';
  events.forEach(function(ev) {
    h += '<button class="filter-btn'+(ev===curEvent?' active':'')+'" onclick="selectEvent(\''+ev+'\')">'+ev+'</button>';
  });
  h += '<button class="filter-btn" onclick="promptAddEvent()" style="color:var(--gold);border-color:var(--gold)">+ Event</button>';
  bar.innerHTML = h;
}

function selectEvent(ev) {
  curEvent = ev;
  persistEvents();
  buildEventBar();
  buildLog();
  if (logBid) buildLogDetail(logBid);
}

function promptAddEvent() {
  var code = prompt('Enter event code (e.g. mabil):');
  if (!code) return;
  code = code.trim().toLowerCase();
  if (!code) return;
  if (events.indexOf(code) === -1) { events.push(code); persistEvents(); }
  selectEvent(code);
}

function buildLog() {
  buildEventBar();
  var list = document.getElementById('log-battery-list');
  var h = '';
  bIds.forEach(function(bid) {
    var entries = logsFor(bid, curEvent);
    var r = avg(entries, 'resist'), p = avg(entries, 'power');
    var u = usageFor(bid, curEvent);
    h += '<div class="log-bat-row" onclick="openLogDetail(\''+bid+'\')">'+
      '<div class="log-bat-num">'+bid.split('-')[1]+'</div>'+
      '<div class="log-bat-stats">'+
        '<div class="log-stat"><div class="log-stat-lbl">Resistance</div><div class="log-stat-val'+(r==null?' none':'')+'">'+( r!=null ? r+' <span style="font-size:11px;color:var(--muted);font-family:\'Barlow\',sans-serif">m&#8486;</span>' : '—')+'</div></div>'+
        '<div class="log-stat"><div class="log-stat-lbl">Power</div><div class="log-stat-val'+(p==null?' none':'')+'">'+( p!=null ? p+' <span style="font-size:11px;color:var(--muted);font-family:\'Barlow\',sans-serif">W</span>' : '—')+'</div></div>'+
        '<div class="log-stat"><div class="log-stat-lbl">Uses</div><div class="log-stat-val'+(u===0?' none':'')+'">'+u+'</div></div>'+
      '</div>'+
      '<div class="log-chevron">›</div>'+
    '</div>';
  });
  list.innerHTML = h || '<div class="empty"><div class="big">📋</div><p>No batteries to log.</p></div>';
}

function openLogDetail(bid) {
  logBid = bid;
  document.getElementById('log-list-page').style.display = 'none';
  document.getElementById('log-detail-page').style.display = 'block';
  buildLogDetail(bid);
}

function closeLogDetail() {
  logBid = null;
  document.getElementById('log-detail-page').style.display = 'none';
  document.getElementById('log-list-page').style.display = 'block';
}

function buildLogDetail(bid) {
  var entries = logsFor(bid, curEvent);
  var u = usageFor(bid, curEvent);
  var r = avg(entries, 'resist'), p = avg(entries, 'power');
  var evLabel = curEvent === 'overall' ? 'All Events' : curEvent.toUpperCase();

  document.getElementById('log-detail-title').textContent = 'Battery ' + bid;
  document.getElementById('log-detail-sub').textContent = evLabel + ' · ' + entries.length + ' entr'+(entries.length!==1?'ies':'y');

  // Averages + usage
  document.getElementById('log-averages').innerHTML =
    avgCard('Resistance', r, 'm&#8486;', entries.length+' readings') +
    avgCard('Power', p, 'W', entries.length+' readings') +
    '<div class="avg-card" style="text-align:center">'+
      '<div class="avg-card-lbl">Match Uses</div>'+
      '<div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-top:4px">'+
        '<button onclick="changeUsage(\''+bid+'\',-1)" style="background:var(--surface2);border:1.5px solid var(--bdim);color:var(--cream);font-size:22px;font-weight:700;border-radius:8px;width:36px;height:36px;cursor:pointer;-webkit-tap-highlight-color:transparent">−</button>'+
        '<div class="avg-card-val" id="usage-val-'+bid+'">'+u+'</div>'+
        '<button onclick="changeUsage(\''+bid+'\',1)" style="background:var(--gold);border:none;color:var(--navy);font-size:22px;font-weight:700;border-radius:8px;width:36px;height:36px;cursor:pointer;-webkit-tap-highlight-color:transparent">+</button>'+
      '</div>'+
      '<div class="avg-card-sub">'+evLabel+'</div>'+
    '</div>';

  // Heating events for this battery (sorted ascending by end time)
  var batHeatEvents = heatLog.filter(function(h){ return h.bid === bid; })
                              .sort(function(a,b){ return a.endMs - b.endMs; });

  // Entry list — all entries for this battery regardless of event filter,
  // sorted newest first, with a heated badge if a heat event ended within
  // the 4 hours before this entry's timestamp.
  var allEntries = (batLogs[bid] || []).slice();
  var el = document.getElementById('log-entry-list');
  if (!allEntries.length && !batHeatEvents.length) {
    el.innerHTML = '<div class="empty" style="padding:30px 0"><p>No entries yet.<br>Tap + Add Entry to log data.</p></div>';
    return;
  }

  // Build combined timeline of measurements + heat events, newest first
  var timeline = [];
  allEntries.forEach(function(e, idx) { timeline.push({kind:'entry', data:e, idx:idx}); });
  batHeatEvents.forEach(function(h) { timeline.push({kind:'heat', data:h}); });
  timeline.sort(function(a,b){
    var ta = a.kind==='entry' ? a.data.ts : a.data.endMs;
    var tb = b.kind==='entry' ? b.data.ts : b.data.endMs;
    return tb - ta; // newest first
  });

  var entryHtml = '';
  timeline.forEach(function(item) {
    if (item.kind === 'heat') {
      var h = item.data;
      var dur = fel(h.endMs - h.startMs);
      var late = h.overdue ? ' <span style="color:var(--red)">overdue</span>' : '';
      entryHtml +=
        '<div class="log-entry" style="border-color:rgba(239,171,40,0.35);background:var(--gold-dim)">'+
          '<div style="font-size:18px;margin-right:2px">🔥</div>'+
          '<div style="flex:1">'+
            '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:13px;font-weight:700;color:var(--gold);display:flex;align-items:center;gap:6px;flex-wrap:wrap">'+
              'Heat Event'+late+
              '<span style="background:rgba(239,171,40,0.12);color:var(--muted);border:1px solid rgba(239,171,40,0.3);border-radius:4px;font-size:10px;padding:1px 6px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px">not a match</span>'+
            '</div>'+
            '<div style="font-size:12px;color:var(--muted);margin-top:3px">'+ft(h.startMs)+' → '+ft(h.endMs)+' · '+dur+'</div>'+
          '</div>'+
          '<button class="log-entry-del" title="Delete" onclick="deleteHeatEntry(\''+bid+'\','+h.startMs+')">✕</button>'+
        '</div>';
    } else {
      var e = item.data, idx = item.idx;
      var d = new Date(e.ts);
      var ts = d.toLocaleDateString([],{month:'short',day:'numeric'})+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      // Heated badge: manual checkbox if set, else auto-detect from heat events within 4h
      var WINDOW = 4*60*60*1000;
      var autoHeated = batHeatEvents.some(function(h){ return h.endMs <= e.ts && (e.ts - h.endMs) <= WINDOW; });
      var wasHeated = (e.heated != null) ? e.heated : autoHeated;
      var heatedBadge = wasHeated ? '<span style="background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold);border-radius:4px;font-family:\'Barlow Condensed\',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;padding:1px 6px;margin-left:6px">🔥 Heated</span>' : '<span style="background:var(--surface2);color:var(--muted);border:1px solid var(--bdim);border-radius:4px;font-family:\'Barlow Condensed\',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;padding:1px 6px;margin-left:6px">Not Heated</span>';
      var evBadge = (e.event && e.event !== 'overall') ? '<span style="background:var(--surface2);color:var(--muted);border:1px solid var(--bdim);border-radius:4px;font-family:\'Barlow Condensed\',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;padding:1px 6px;margin-left:4px">'+e.event+'</span>' : '';
      entryHtml +=
        '<div class="log-entry">'+
          '<div style="flex:1">'+
            '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:13px;font-weight:700;color:var(--muted);display:flex;align-items:center;flex-wrap:wrap;gap:2px">'+
              ts+(e.note?' · <span style="color:var(--cream)">'+e.note+'</span>':'')+heatedBadge+evBadge+
            '</div>'+
            '<div style="display:flex;gap:16px;margin-top:5px">'+
              '<div class="log-entry-val">'+(e.resist!=null&&e.resist!==''?e.resist+' <span>m&#8486;</span>':'<span>—</span>')+'</div>'+
              '<div class="log-entry-val">'+(e.power!=null&&e.power!==''?e.power+' <span>W</span>':'<span>—</span>')+'</div>'+
            '</div>'+
          '</div>'+
          '<div style="display:flex;flex-direction:column;gap:6px;align-items:center">'+
            '<button class="log-entry-del" title="Edit" onclick="editLogEntry(\''+bid+'\','+idx+')" style="color:var(--gold)">✎</button>'+
            '<button class="log-entry-del" title="Delete" onclick="deleteLogEntry(\''+bid+'\','+idx+')">✕</button>'+
          '</div>'+
        '</div>';
    }
  });
  el.innerHTML = entryHtml;
}

function avgCard(lbl, val, unit, sub) {
  return '<div class="avg-card">'+
    '<div class="avg-card-lbl">'+lbl+'</div>'+
    '<div class="avg-card-val">'+(val!=null?val:'—')+'</div>'+
    (val!=null?'<div class="avg-card-unit">'+unit+'</div>':'')+
    '<div class="avg-card-sub">'+sub+'</div>'+
  '</div>';
}

function changeUsage(bid, delta) {
  if (!usageCounts[bid]) usageCounts[bid] = {};
  var ev = curEvent;
  usageCounts[bid][ev] = Math.max(0, (usageCounts[bid][ev]||0) + delta);
  persistUsage();
  var el = document.getElementById('usage-val-'+bid);
  if (el) el.textContent = usageCounts[bid][ev];
  buildLog();
}

function setHeatedToggle(val) {
  var tog = document.getElementById('lm-heated-toggle');
  tog.classList.toggle('on', !!val);
  document.getElementById('lm-check').textContent = val ? '✓' : '';
}

function toggleHeated() {
  var tog = document.getElementById('lm-heated-toggle');
  setHeatedToggle(!tog.classList.contains('on'));
}

function openLogEntry() {
  logEditIdx = null;
  document.getElementById('lm-title').textContent = 'Add Entry — ' + (logBid||'');
  document.getElementById('lm-resist').value = '';
  document.getElementById('lm-power').value = '';
  document.getElementById('lm-note').value = '';
  document.getElementById('lm-save-btn').textContent = 'Save Entry';
  // auto-check heated if this battery was heated in last 4h
  var lh = lastHeat(logBid);
  setHeatedToggle(lh && (Date.now() - lh.endMs) < 4*60*60*1000);
  document.getElementById('log-modal-backdrop').classList.add('open');
  setTimeout(function(){ document.getElementById('lm-resist').focus(); }, 80);
}

function editLogEntry(bid, idx) {
  if (!batLogs[bid] || !batLogs[bid][idx]) return;
  logEditIdx = idx;
  var e = batLogs[bid][idx];
  document.getElementById('lm-title').textContent = 'Edit Entry — ' + bid;
  document.getElementById('lm-resist').value = e.resist != null ? e.resist : '';
  document.getElementById('lm-power').value  = e.power  != null ? e.power  : '';
  document.getElementById('lm-note').value   = e.note   || '';
  document.getElementById('lm-save-btn').textContent = 'Update Entry';
  setHeatedToggle(!!e.heated);
  document.getElementById('log-modal-backdrop').classList.add('open');
  setTimeout(function(){ document.getElementById('lm-resist').focus(); }, 80);
}

function closeLogEntry() {
  document.getElementById('log-modal-backdrop').classList.remove('open');
  logEditIdx = null;
}

function saveLogEntry() {
  if (!logBid) return;
  var r = document.getElementById('lm-resist').value.trim();
  var p = document.getElementById('lm-power').value.trim();
  var n = document.getElementById('lm-note').value.trim();
  var heated = document.getElementById('lm-heated-toggle').classList.contains('on');
  if (r==='' && p==='') { alert('Enter at least one value.'); return; }
  if (!batLogs[logBid]) batLogs[logBid] = [];
  var entry = { resist: r===''?null:parseFloat(r), power: p===''?null:parseFloat(p), note: n, event: curEvent, heated: heated };
  if (logEditIdx !== null) {
    entry.ts = batLogs[logBid][logEditIdx].ts;
    batLogs[logBid][logEditIdx] = entry;
  } else {
    entry.ts = Date.now();
    batLogs[logBid].push(entry);
    // auto-increment match counter for new entries only
    if (!usageCounts[logBid]) usageCounts[logBid] = {};
    usageCounts[logBid][curEvent] = (usageCounts[logBid][curEvent] || 0) + 1;
    persistUsage();
  }
  persistBatLogs();
  closeLogEntry();
  buildLogDetail(logBid);
  buildLog();
}

function deleteLogEntry(bid, idx) {
  if (!confirm('Delete this entry?')) return;
  batLogs[bid].splice(idx, 1);
  persistBatLogs();
  buildLogDetail(bid);
  buildLog();
}

function deleteHeatEntry(bid, startMs) {
  if (!confirm('Delete this heat event?')) return;
  heatLog = heatLog.filter(function(h){ return !(h.bid === bid && h.startMs === startMs); });
  persistLog();
  buildLogDetail(bid);
}

// ── EXPORT / IMPORT ──
function exportJSON() {
  var data = { bIds:bIds, bats:bats, heatLog:heatLog, batLogs:batLogs, usageCounts:usageCounts, events:events, curEvent:curEvent };
  var blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '6328-battery-data-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}

function importJSON(ev) {
  var file = ev.target.files[0]; if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (!confirm('This will replace all current data. Continue?')) return;
      if (data.bIds)        { bIds = data.bIds; localStorage.setItem('ma-ids', JSON.stringify(bIds)); }
      if (data.bats)        { bats = data.bats; localStorage.setItem('ma-bats', JSON.stringify(bats)); }
      if (data.heatLog)     { heatLog = data.heatLog; persistLog(); }
      if (data.batLogs)     { batLogs = data.batLogs; persistBatLogs(); }
      if (data.usageCounts) { usageCounts = data.usageCounts; persistUsage(); }
      if (data.events)      { events = data.events; }
      if (data.curEvent)    { curEvent = data.curEvent; }
      persistEvents();
      tick(); buildManage();
      alert('Import successful!');
    } catch(err) { alert('Invalid file: '+err.message); }
  };
  reader.readAsText(file);
  ev.target.value = '';
}

function exportCSV() {
  var rows = [['Battery','Event','Timestamp','Resistance (mΩ)','Power (W)','Note']];
  bIds.forEach(function(bid) {
    var entries = batLogs[bid] || [];
    entries.forEach(function(e) {
      rows.push([bid, e.event||'overall', new Date(e.ts).toISOString(), e.resist!=null?e.resist:'', e.power!=null?e.power:'', e.note||'']);
    });
    // usage rows
    var u = usageCounts[bid] || {};
    Object.keys(u).forEach(function(ev) {
      if (u[ev]) rows.push([bid, ev, '', '', '', 'USAGE: '+u[ev]+' matches']);
    });
  });
  var csv = rows.map(function(r){ return r.map(function(c){ return '"'+String(c).replace(/"/g,'""')+'"'; }).join(','); }).join('\n');
  var blob = new Blob([csv], {type:'text/csv'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '6328-battery-log-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

function switchTab(page) {
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('page-'+page).classList.add('active');
  document.getElementById('tab-'+page).classList.add('active');
  if(page==='history') buildHistory();
  if(page==='manage') buildManage();
  if(page==='log') { closeLogDetail(); buildLog(); }
}

function setTileSize(btn) {
  var size = btn.dataset.size;
  document.documentElement.style.setProperty('--tile', size+'px');
  localStorage.setItem('ma-tilesize', size);
  document.querySelectorAll('.size-opt').forEach(function(b){ b.classList.toggle('active', b===btn); });
}

function loadTileSize() {
  var saved = localStorage.getItem('ma-tilesize') || '200';
  document.documentElement.style.setProperty('--tile', saved+'px');
  document.querySelectorAll('.size-opt').forEach(function(b){
    b.classList.toggle('active', b.dataset.size === saved);
  });
}

document.getElementById('log-modal-backdrop').addEventListener('click', function(e){
  if(e.target===document.getElementById('log-modal-backdrop')) closeLogEntry();
});

init(); loadTileSize(); tick(); setInterval(tick,1000);
</script>
